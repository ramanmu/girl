[GLOBAL]
csv_file = biobank_data.csv
epsilon = 1e-09
default_top_k = 25
model_name = sentence-transformers/all-MiniLM-L6-v2
index_file_basename = bio_index
manifest_file = manifest.json

# The ONLY columns the AI and BM25 will read (The Semantic Space)
vector_columns = name, description

# Strict exact-match dropdowns
category_filters = fees

# Fuzzy substring matches
text_filters = address, repository_type
